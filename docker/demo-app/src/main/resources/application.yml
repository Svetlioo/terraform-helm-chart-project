server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/appdb}
    username: ${DB_USERNAME:appuser}
    password: ${DB_PASSWORD:apppass}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

app:
  environment: ${APP_ENVIRONMENT:local}
  version: ${APP_VERSION:1.0.0}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
