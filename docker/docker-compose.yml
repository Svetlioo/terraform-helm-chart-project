# Docker Compose for local development WITHOUT Kubernetes
# Runs the Java app + PostgreSQL for all 3 environments as plain containers.
#
# Usage:
#   cp secrets/.env.example secrets/.env   # fill in your passwords
#   docker compose --env-file secrets/.env -f docker/docker-compose.yml up -d
#
# Access:
#   Dev:  http://localhost:8081
#   Test: http://localhost:8082
#   Prod: http://localhost:8083

services:
  # --- DEV Environment ---
  postgresql-dev:
    image: postgres:16-alpine
    container_name: postgresql-dev
    environment:
      POSTGRES_DB: appdb_dev
      POSTGRES_USER: appuser_dev
      POSTGRES_PASSWORD: ${DB_PASSWORD_DEV:?Set DB_PASSWORD_DEV in secrets/.env}
    ports:
      - "5432:5432"
    volumes:
      - pgdata-dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser_dev"]
      interval: 10s
      timeout: 5s
      retries: 3

  java-app-dev:
    build:
      context: .
      dockerfile: Dockerfile.demo
    container_name: java-app-dev
    depends_on:
      postgresql-dev:
        condition: service_healthy
    environment:
      APP_ENVIRONMENT: dev
      APP_VERSION: 1.0.0-dev
      DB_URL: jdbc:postgresql://postgresql-dev:5432/appdb_dev
      DB_USERNAME: appuser_dev
      DB_PASSWORD: ${DB_PASSWORD_DEV}
    ports:
      - "8081:8080"

  # --- TEST Environment ---
  postgresql-test:
    image: postgres:16-alpine
    container_name: postgresql-test
    environment:
      POSTGRES_DB: appdb_test
      POSTGRES_USER: appuser_test
      POSTGRES_PASSWORD: ${DB_PASSWORD_TEST:?Set DB_PASSWORD_TEST in secrets/.env}
    ports:
      - "5433:5432"
    volumes:
      - pgdata-test:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser_test"]
      interval: 10s
      timeout: 5s
      retries: 3

  java-app-test:
    build:
      context: .
      dockerfile: Dockerfile.demo
    container_name: java-app-test
    depends_on:
      postgresql-test:
        condition: service_healthy
    environment:
      APP_ENVIRONMENT: test
      APP_VERSION: 1.0.0-rc
      DB_URL: jdbc:postgresql://postgresql-test:5432/appdb_test
      DB_USERNAME: appuser_test
      DB_PASSWORD: ${DB_PASSWORD_TEST}
    ports:
      - "8082:8080"

  # --- PROD Environment ---
  postgresql-prod:
    image: postgres:16-alpine
    container_name: postgresql-prod
    environment:
      POSTGRES_DB: appdb_prod
      POSTGRES_USER: appuser_prod
      POSTGRES_PASSWORD: ${DB_PASSWORD_PROD:?Set DB_PASSWORD_PROD in secrets/.env}
    ports:
      - "5434:5432"
    volumes:
      - pgdata-prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser_prod"]
      interval: 10s
      timeout: 5s
      retries: 3

  java-app-prod:
    build:
      context: .
      dockerfile: Dockerfile.demo
    container_name: java-app-prod
    depends_on:
      postgresql-prod:
        condition: service_healthy
    environment:
      APP_ENVIRONMENT: prod
      APP_VERSION: 1.0.0
      DB_URL: jdbc:postgresql://postgresql-prod:5432/appdb_prod
      DB_USERNAME: appuser_prod
      DB_PASSWORD: ${DB_PASSWORD_PROD}
    ports:
      - "8083:8080"

volumes:
  pgdata-dev:
  pgdata-test:
  pgdata-prod:
