# Production environment values
replicaCount: 2

image:
  repository: ghcr.io/svetlioo/java-app
  tag: "1.0.0-2fa5358"

env:
  APP_ENVIRONMENT: "prod"
  APP_VERSION: "1.0.0"

database:
  host: postgresql-prod
  name: appdb_prod
  username: appuser_prod
  existingSecret: java-app-db-secret

resources:
  limits:
    cpu: 1000m
    memory: 768Mi
  requests:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 75

ingress:
  enabled: false
