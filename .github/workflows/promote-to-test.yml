# =============================================================================
# PROMOTE DEV → TEST
# =============================================================================
# Reads the image tag from values-dev.yaml on the dev branch and writes it
# into values-test.yaml on the test branch via a PR.
# Does NOT merge dev into test — only updates the image tag in test.
# After merge, ArgoCD auto-deploys to the test namespace.
# =============================================================================

name: Promote dev → test

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for promotion'
        required: false
        default: 'Manual promotion after dev verification'

  push:
    branches: [dev]
    paths:
      - 'helm/java-app/values-dev.yaml'

jobs:
  promote:
    name: Create PR dev → test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout test branch
        uses: actions/checkout@v4
        with:
          ref: test
          fetch-depth: 0

      - name: Read image tag from dev
        id: dev-version
        run: |
          git fetch origin dev
          IMAGE_TAG=$(git show origin/dev:helm/java-app/values-dev.yaml | grep 'tag:' | sed 's/.*tag: "\(.*\)"/\1/')
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "Promoting tag: ${IMAGE_TAG}"

      - name: Update values-test.yaml with new tag
        run: |
          IMAGE_TAG="${{ steps.dev-version.outputs.image_tag }}"
          sed -i "s|tag: \".*\"|tag: \"${IMAGE_TAG}\"|" helm/java-app/values-test.yaml
          grep 'tag:' helm/java-app/values-test.yaml

      - name: Create PR into test branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          IMAGE_TAG="${{ steps.dev-version.outputs.image_tag }}"
          REASON="${{ github.event.inputs.reason || 'Automated promotion from dev' }}"
          BRANCH="promote/test-${IMAGE_TAG//[^a-zA-Z0-9]/-}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "${BRANCH}"
          git add helm/java-app/values-test.yaml
          git commit -m "promote(test): java-app ${IMAGE_TAG}"
          git push origin "${BRANCH}"

          PR_URL=$(gh pr create \
            --title "promote(test): java-app ${IMAGE_TAG}" \
            --body "## Promotion: dev → test

          | Field | Value |
          |-------|-------|
          | Image tag | \`${IMAGE_TAG}\` |
          | Reason | ${REASON} |

          Merge to deploy to the **test** namespace via ArgoCD." \
            --base test \
            --head "${BRANCH}")

          echo "PR created: ${PR_URL}" >> $GITHUB_STEP_SUMMARY
