# =============================================================================
# PROMOTE TEST → PROD
# =============================================================================
# Reads the image tag from values-test.yaml on the test branch and writes it
# into values-prod.yaml on the prod branch via a PR.
# Does NOT merge test into prod — only updates the image tag in prod.
# After merge, ArgoCD shows prod as OutOfSync — you must click Sync manually.
# =============================================================================

name: Promote test → prod

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason / ticket number for this production release'
        required: true

jobs:
  promote:
    name: Create PR test → prod
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout prod branch
        uses: actions/checkout@v4
        with:
          ref: prod
          fetch-depth: 0

      - name: Read image tag from test
        id: test-version
        run: |
          git fetch origin test
          IMAGE_TAG=$(git show origin/test:helm/java-app/values-test.yaml | grep 'tag:' | sed 's/.*tag: "\(.*\)"/\1/')
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "Promoting tag: ${IMAGE_TAG}"

      - name: Update values-prod.yaml with new tag
        run: |
          IMAGE_TAG="${{ steps.test-version.outputs.image_tag }}"
          if grep -q 'tag:' helm/java-app/values-prod.yaml; then
            sed -i "s|tag: \".*\"|tag: \"${IMAGE_TAG}\"|" helm/java-app/values-prod.yaml
          else
            sed -i "/repository:/a\\  tag: \"${IMAGE_TAG}\"" helm/java-app/values-prod.yaml
          fi
          grep -A2 'image:' helm/java-app/values-prod.yaml

      - name: Create PR into prod branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          IMAGE_TAG="${{ steps.test-version.outputs.image_tag }}"
          REASON="${{ github.event.inputs.reason }}"
          BRANCH="promote/prod-${IMAGE_TAG//[^a-zA-Z0-9]/-}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "${BRANCH}"
          git add helm/java-app/values-prod.yaml
          git commit -m "promote(prod): java-app ${IMAGE_TAG}"
          git push origin "${BRANCH}"

          PR_URL=$(gh pr create \
            --title "release(prod): java-app ${IMAGE_TAG}" \
            --body "## Production Release: test → prod

          | Field | Value |
          |-------|-------|
          | Image tag | \`${IMAGE_TAG}\` |
          | Reason / Ticket | ${REASON} |
          | Initiated by | @${{ github.actor }} |

          ### After merging
          - ArgoCD will show prod apps as **OutOfSync**
          - Go to ArgoCD UI and manually click **Sync**

          ### Pre-merge checklist
          - [ ] Test environment verified and healthy
          - [ ] Approved by relevant stakeholder
          - [ ] Production deployment window is appropriate" \
            --base prod \
            --head "${BRANCH}")

          echo "PR created: ${PR_URL}" >> $GITHUB_STEP_SUMMARY
          echo "After merging: go to ArgoCD UI and manually sync the prod apps." >> $GITHUB_STEP_SUMMARY
