# =============================================================================
# IAC REPOSITORY CI PIPELINE
# =============================================================================
# This pipeline runs on the IaC repo. It validates Helm charts and Terraform.
# It does NOT build the Java app - that's the app repo's job.
#
# The app repo CI pushes a new image tag to the dev branch of this repo,
# which triggers this pipeline to validate the change before ArgoCD deploys.
# =============================================================================

name: Validate IaC

on:
  push:
    branches: [dev, test, prod, main]
  pull_request:
    branches: [dev, test, prod, main]

jobs:
  lint-helm:
    name: Lint Helm Charts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.13.0

      - name: Lint Java App Chart (all envs)
        run: |
          helm lint helm/java-app/ -f helm/java-app/values-dev.yaml
          helm lint helm/java-app/ -f helm/java-app/values-test.yaml
          helm lint helm/java-app/ -f helm/java-app/values-prod.yaml

      - name: Lint PostgreSQL Chart (all envs)
        run: |
          helm lint helm/postgresql/ -f helm/postgresql/values-dev.yaml
          helm lint helm/postgresql/ -f helm/postgresql/values-test.yaml
          helm lint helm/postgresql/ -f helm/postgresql/values-prod.yaml

  template-helm:
    name: Template Helm Charts
    runs-on: ubuntu-latest
    needs: lint-helm
    strategy:
      matrix:
        env: [dev, test, prod]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3

      - name: Template Java App (${{ matrix.env }})
        run: |
          helm template java-app-${{ matrix.env }} helm/java-app/ \
            -f helm/java-app/values-${{ matrix.env }}.yaml \
            --namespace ${{ matrix.env }}

      - name: Template PostgreSQL (${{ matrix.env }})
        run: |
          helm template postgresql-${{ matrix.env }} helm/postgresql/ \
            -f helm/postgresql/values-${{ matrix.env }}.yaml \
            --namespace ${{ matrix.env }}

  validate-terraform:
    name: Validate Terraform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Terraform Format Check
        working-directory: terraform
        run: terraform fmt -check

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate
